
http
{

	server {
	
		listen  8080;

		client_max_body_size  1040008576;

		allow_method GET POST;

		server_name  localhost:8080;
		
		root www/;
		index index.html;
		
		error_page_404  www/errors/404.html;
		error_page_500  www/errors/500.html;

		
		location /upload {
			root DB/;
			allow_methods  POST DELETE;
		}
		
		location /cgi-bin {

			root cgi-bin/;
			cgi_extension php;
			cgi_extension py;
			cgi_extension sh;
			allow_methods  POST GET;
		 }
	}
	
	server
	{
		listen  6060;

		client_max_body_size  1048576;

		server_name  localhost:6060;

		allow_methods GET;

		root www/public/;
		index index.html;

		error_page_404  www/errors/404.html;
		error_page_500  www/errors/500.html;

		

		location /home {
			return 301 /;
		}

		location /_next {
			root out/_next;
		}

		location /audio
		{
			root out/audio;
		}

		location  /out
		{
			root out/;
		}		
	}

	server
	{
		listen  3030;

		client_max_body_size  600;

		server_name  localhost:3030;

		allow_methods GET;

		root  www/Todo/;
		index index.html;

		error_page_404  www/errors/404.html;
		error_page_500  www/errors/500.html;

		location /hello1 {
			root errors/;
			autoindex off;
		}

		location /hello2 {
			root errors/;
			allow_methods  GET POST;
			autoindex on;
		}
		
		location /audio
		{
			root out/audio/;
		}

		location /user/list {
			client_max_body_size  1000;
			root DB/list/;
			allow_methods  GET POST;
		}		
	}
}
